# Map special characters to a normalized ASCII representation for searching
# In the format: "special character": "textual representation"
# MUST wrap the special character in quotes to avoid parsing errors

# EXAMPLES:
# "bar foo": "Foo Bar" is OK
# bar: "Foo Bar" is OK
# bar foo: "Foo Bar" is NOT OK
# "Bar Foo": "Foo Bar" is OK, but it won't match anything

"Æ": AE
